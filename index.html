<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una pregunta importante...</title>
    <style>
        /* Estilos generales y colores tipo Spiderman */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0d1117; /* Fondo oscuro */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        #mensaje {
            font-size: 26px;
            margin-bottom: 40px;
            min-height: 80px;
            font-weight: bold;
            line-height: 1.4;
            transition: opacity 0.4s ease; /* Efecto suave al cambiar el texto */
        }
        
        .boton-respuesta {
            background-color: #e23636; /* Rojo Spiderman */
            color: white;
            border: 2px solid #504caf; /* Azul Spiderman */
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
            margin: 10px;
            display: inline-block;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }
        
        .boton-respuesta:active {
            transform: scale(0.95);
        }
        
        .escondido {
            display: none !important;
        }
        
        .gif-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(226, 54, 54, 0.5);
        }
    </style>
</head>
<body>

    <div id="mensaje">¡Hola! 👋</div>

    <div id="botones-container">
        <button id="btn-principal" class="boton-respuesta" onclick="siguientePaso()">¡Hola!</button>
    </div>

    <div id="botones-finales" class="escondido">
        <button id="btn-si" class="boton-respuesta" onclick="respuestaFinal('si')">¡Obvio que sí! 🕸️</button>
        <button id="btn-no" class="boton-respuesta" style="background-color: #333; border-color: #555;" onclick="respuestaFinal('no')">No puedo 😔</button>
    </div>

    <div id="gif-final" class="gif-container escondido">
        <img src="https://media.giphy.com/media/BWD3CtcudWL28/giphy.gif" alt="Spiderman">
    </div>

    <script>
        const dialogos = [
            { texto: "Tengo una pregunta muy importante que hacerte...", boton: "¿De qué se trata? 🤔" },
            { texto: "Yo estaba pensandooooooooo 👀", boton: "Aja... sigue 👀" },
            { texto: "¿Quisieras ir a ver el estreno de SPIDER MAN BRAND NEW DAY conmigo?", boton: "" }
        ];

        let pasoActual = 0;
        let contadorNo = 0; // Agregamos un contador para las veces que dice "No"

        function siguientePaso() {
            const mensajeEl = document.getElementById('mensaje');
            const btnPrincipal = document.getElementById('btn-principal');
            const botonesFinales = document.getElementById('botones-finales');

            mensajeEl.style.opacity = 0;

            setTimeout(() => {
                if (pasoActual < dialogos.length - 1) {
                    mensajeEl.innerText = dialogos[pasoActual].texto;
                    btnPrincipal.innerText = dialogos[pasoActual].boton;
                    pasoActual++;
                } else if (pasoActual === dialogos.length - 1) {
                    mensajeEl.innerText = dialogos[pasoActual].texto;
                    btnPrincipal.classList.add('escondido');
                    botonesFinales.classList.remove('escondido');
                }
                mensajeEl.style.opacity = 1;
            }, 400);
        }

        function respuestaFinal(respuesta) {
            const mensajeEl = document.getElementById('mensaje');
            const botonesFinales = document.getElementById('botones-finales');
            const gifFinal = document.getElementById('gif-final');
            const btnSi = document.getElementById('btn-si');
            const btnNo = document.getElementById('btn-no');

            if (respuesta === 'si') {
                // Si dice que sí, ocultamos botones y mostramos victoria
                botonesFinales.classList.add('escondido');
                mensajeEl.innerText = "¡Genial! Yo invito las palomas. 🍿🕷️";
                gifFinal.classList.remove('escondido');
            } else {
                // Si dice que no, entra al juego de insistir
                contadorNo++;
                mensajeEl.style.opacity = 0;

                setTimeout(() => {
                    if (contadorNo === 1) {
                        mensajeEl.innerText = "A ver, lo voy a preguntar otra vez... ¿quieres ver el estreno?";
                        btnNo.innerText = "Mmm... no 🙈";
                    } else if (contadorNo === 2) {
                        mensajeEl.innerText = "Te doy una oportunidad más... ¿Segura que no quieres ir?";
                        btnNo.innerText = "Sigo diciendo que no 😤";
                    } else if (contadorNo >= 3) {
                        // Interacción final: Se acaban las opciones de decir que no
                        mensajeEl.innerText = "¡Ups! Ocurrió un error en el código y ya no puedes decir que no. ¿Vamos?";
                        
                        // Cambiamos el texto del botón de negación
                        btnNo.innerText = "¡Bueno, ya, sí voy! ❤️";
                        
                        // Le damos estilo rojo como al botón principal
                        btnNo.style.backgroundColor = "#e23636";
                        btnNo.style.borderColor = "#504caf";
                        
                        // Cambiamos la función para que ahora actúe como un "Sí"
                        btnNo.setAttribute('onclick', "respuestaFinal('si')");
                    }
                    mensajeEl.style.opacity = 1;
                }, 400);
            }
        }
    </script>
</body>
</html>
